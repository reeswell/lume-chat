services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: vue_chat
      POSTGRES_USER: vue_chat
      POSTGRES_PASSWORD: vue_chat_password
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: [redis-server, --appendonly, yes]
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
